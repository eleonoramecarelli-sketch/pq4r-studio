    // ---- JSON SAVE / LOAD ----
    function exportSessionJSON() {
      var totalSec=(S.sessionTimer||0)+(S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0);
      var data = {
        version: 1,
        app: 'PQ4R Studio',
        exportedAt: new Date().toISOString(),
        id: S.sessionId, name: S.sessionName||'Sessione',
        score: computeScore(), totalSeconds: totalSec,
        phase: S.phase, answers: S.answers, maps: S.maps,
        reciteAnswers: S.reciteAnswers||{}, reviewParts: S.reviewParts||{},
        sessionTimer: totalSec
      };
      var json = JSON.stringify(data, null, 2);
      var fname = (S.sessionName||'pq4r').replace(/[^a-zA-Z0-9À-ÿ\s\-_]/g,'').trim().replace(/\s+/g,'-') || 'sessione';
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([json],{type:'application/json'}));
      a.download = fname + '.pq4r.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      S.exported = true; saveCurrentSession(); updateBadge();
      alert('File salvato: ' + fname + '.pq4r.json\nConservalo su Google Drive o in un posto sicuro.');
    }

    function importSessionJSON() {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json,.pq4r.json';
      input.onchange = function(e) {
        var file = e.target.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            var data = JSON.parse(ev.target.result);
            if(!data.app || data.app !== 'PQ4R Studio') {
              alert('File non riconosciuto. Assicurati di caricare un file .pq4r.json salvato da PQ4R Studio.');
              return;
            }
            // Genera nuovo ID per evitare conflitti
            var newId = 'imp_' + Date.now();
            var sessions = loadAllSessions();
            var session = {
              id: newId, name: (data.name||'Sessione importata'),
              updatedAt: Date.now(), exported: false,
              score: data.score||0, totalSeconds: data.totalSeconds||0,
              phase: data.phase||0, answers: data.answers||{}, maps: data.maps||{},
              reciteAnswers: data.reciteAnswers||{}, reviewParts: data.reviewParts||{},
              sessionTimer: data.sessionTimer||0
            };
            sessions.unshift(session);
            saveAllSessions(sessions);
            alert('Sessione "' + session.name + '" importata con successo!');
            renderHome();
          } catch(err) {
            alert('Errore nella lettura del file: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      document.body.appendChild(input); input.click(); document.body.removeChild(input);
    }

    // ---- INIT ----
    document.body.innerHTML=''
      // debug bar nascosta
      +'<div id="debug-bar" style="display:none;">Pronto</div>'
      // HEADER
      +'<div class="header">'
      +'<button onclick="openDrawer()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0;margin-right:4px;line-height:1;display:flex;align-items:center;">&#9776;</button>'
      +'<span class="header-title" id="session-title">PQ4R Studio</span>'
      +'<span id="header-phase" class="header-phase" style="flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>'
      +'<div style="flex:1;"></div>'
      +'<span id="timer-display" style="font-size:11px;color:var(--text3);min-width:36px;text-align:right;font-variant-numeric:tabular-nums;"></span>'
      +'<button id="pomodoro-btn" onclick="togglePomodoro()" title="Timer Pomodoro (25min)" style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;font-family:var(--font);font-weight:500;">🍅 25m 00s</button>'
      +'<button onclick="changeFontSize(-1)" title="Riduci testo" style="background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:0 4px;font-weight:700;">A−</button>'
      +'<button onclick="changeFontSize(1)" title="Aumenta testo" style="background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:0 4px;font-weight:700;">A+</button>'
      +'<div id="home-badge" style="display:none;min-width:18px;height:18px;border-radius:9px;background:var(--amber);color:#fff;font-size:11px;font-weight:700;align-items:center;justify-content:center;padding:0 4px;"></div>'
      +'</div>'
      // Drawer overlay
      +'<div id="drawer-overlay" onclick="closeDrawer()"></div>'
      // Drawer
      +'<div id="drawer">'
      +'<div id="drawer-header">'
      +'<div id="drawer-session-name">PQ4R Studio</div>'
      +'<div id="drawer-progress">Completezza: 0%</div>'
      +'<div id="drawer-progress-bar"><div id="drawer-progress-fill" style="width:0%"></div></div>'
      +'</div>'
      +'<div id="drawer-phases"></div>'
      +'<div id="drawer-footer">'
      +'<button id="guided-btn" onclick="toggleGuidedMode()" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:13px;cursor:pointer;text-align:left;color:var(--text2);font-family:var(--font);">📚 Modalità Guidata</button>'
      +'<button onclick="closeDrawer();showHome();" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:13px;cursor:pointer;text-align:left;color:var(--text2);font-family:var(--font);">⌂ Home</button>'
      +'</div>'
      +'</div>'
      +'<div id="home-view" style="padding:20px 16px;max-width:600px;margin:0 auto;"><div id="home-content"></div></div>'
      +'<div id="main-view" style="display:none;"><div class="content" id="main-content"></div></div>';

    document.getElementById('debug-bar').textContent = 'Pronto';
    applyFontSize();
    document.body.insertAdjacentHTML('beforeend', mathKeyboardHTML());
    showHome();
</script>
</body>
</html>
