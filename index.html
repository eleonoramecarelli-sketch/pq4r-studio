<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PQ4R Studio">
    <title>PQ4R Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
          --blue: #2563EB; --blue-light: #EFF6FF; --blue-mid: #3B82F6;
          --blue-dark: #1E40AF;
          --green: #059669; --green-light: #ECFDF5;
          --amber: #D97706; --amber-light: #FFFBEB;
          --red: #DC2626;
          --text: #111827; --text2: #4B5563; --text3: #9CA3AF;
          --bg: #FAFAFA; --bg2: #F3F4F6; --bg3: #E5E7EB;
          --border: #E5E7EB; --border-focus: #93C5FD;
          --white: #FFFFFF;
          --radius: 12px; --radius-sm: 8px; --radius-xs: 5px;
          --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
          --shadow: 0 4px 16px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
          --shadow-lg: 0 12px 40px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
          --font: 'DM Sans', -apple-system, sans-serif;
          --font-display: 'DM Serif Display', Georgia, serif;
        }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── HEADER ── */
        .header {
          background: var(--white);
          border-bottom: 1px solid var(--border);
          padding: 0 16px;
          height: 52px;
          position: sticky; top: 0; z-index: 100;
          display: flex; align-items: center; gap: 10px;
        }
        .header-title {
          font-size: 15px; font-weight: 600; flex: 1;
          color: var(--text); letter-spacing: -.01em;
        }
        .header-phase {
          font-size: 11px; color: var(--text3);
          background: var(--bg2); border-radius: 20px;
          padding: 3px 9px; font-weight: 500;
        }

        /* ── STEPPER / DRAWER ── */
        .stepper { display: flex; background: var(--white); border-bottom: 1px solid var(--border);
          overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .stepper::-webkit-scrollbar { display: none; }
        .step-btn {
          width:100%; padding:14px 16px; font-size:13px; font-weight:500;
          border:none; background:transparent; color:var(--text3);
          border-left:2px solid transparent; cursor:pointer; text-align:left;
          display:flex; align-items:center; gap:10px;
          transition: background .15s, color .15s;
          font-family: var(--font);
        }
        .step-btn:hover { background: var(--bg); color: var(--text2); }
        .step-btn.active {
          color: var(--blue); border-left-color: var(--blue);
          background: var(--blue-light); font-weight: 600;
        }
        .step-btn.done { color: var(--green); border-left-color: var(--green); }
        .step-btn .dot {
          flex-shrink:0; width:7px; height:7px; border-radius:50%;
          background:currentColor; opacity: .7;
        }
        .step-btn .step-label { flex:1; }
        .step-btn .step-check { font-size:11px; opacity:0.6; }

        /* ── DRAWER ── */
        #drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.25); z-index:300; backdrop-filter:blur(2px); }
        #drawer-overlay.open { display:block; }
        #drawer {
          position:fixed; top:0; left:0; bottom:0; width:268px;
          background: var(--white);
          z-index:301; transform:translateX(-100%);
          transition:transform .22s cubic-bezier(.4,0,.2,1);
          display:flex; flex-direction:column;
          box-shadow: var(--shadow-lg);
        }
        #drawer.open { transform:translateX(0); }
        #drawer-header {
          background: linear-gradient(135deg, #1E40AF 0%, #2563EB 100%);
          padding: 24px 18px 18px;
        }
        #drawer-session-name {
          font-size:15px; font-weight:600; color:#fff;
          margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
          letter-spacing: -.01em;
        }
        #drawer-progress { font-size:11px; color:rgba(255,255,255,.65); margin-bottom:10px; }
        #drawer-progress-bar { height:3px; background:rgba(255,255,255,.2); border-radius:2px; }
        #drawer-progress-fill { height:3px; background:#34D399; border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); }
        #drawer-phases { flex:1; overflow-y:auto; padding:6px 0; }
        #drawer-footer {
          padding:12px 14px; border-top:1px solid var(--border);
          display:flex; flex-direction:column; gap:5px;
        }

        /* ── CONTENT ── */
        .content { padding: 16px; max-width: 680px; margin: 0 auto; }

        /* ── PHASE CARDS ── */
        .phase-card {
          background: var(--white);
          border-radius: var(--radius);
          border: 1px solid var(--border);
          padding: 20px;
          margin-bottom: 14px;
          box-shadow: var(--shadow-sm);
        }
        .phase-eyebrow {
          font-size: 10px; font-weight: 600; letter-spacing: .1em;
          color: var(--text3); text-transform: uppercase; margin-bottom: 6px;
        }
        .phase-name {
          font-family: var(--font-display);
          font-size: 22px; color: var(--blue); margin-bottom: 8px;
          letter-spacing: -.02em; line-height: 1.2;
        }
        .phase-desc {
          font-size: 14px; color: var(--text2); line-height: 1.65;
          margin-bottom: 16px;
        }
        .phase-prompt {
          font-size: 12px; color: var(--text3); margin-bottom: 8px;
          font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
        }

        /* ── TEXTAREA ── */
        textarea {
          width: 100%; min-height: 130px; padding: 14px;
          font-size: 14px; line-height: 1.65; font-family: var(--font);
          border: 1px solid var(--border); border-radius: var(--radius-sm);
          background: var(--bg); color: var(--text); resize: vertical;
          -webkit-appearance: none; appearance: none;
          transition: border-color .15s, box-shadow .15s;
        }
        textarea:focus {
          outline: none; border-color: var(--border-focus);
          box-shadow: 0 0 0 3px rgba(37,99,235,.08);
          background: var(--white);
        }

        /* ── BUTTONS ── */
        .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
        .btn {
          flex: 1; min-width: 100px; padding: 11px 16px;
          border-radius: var(--radius-sm); border: 1px solid var(--border);
          font-size: 13px; font-weight: 500; cursor: pointer;
          background: var(--white); color: var(--text2); text-align: center;
          -webkit-appearance: none; transition: all .15s;
          font-family: var(--font); letter-spacing: -.01em;
        }
        .btn:hover { background: var(--bg2); border-color: var(--bg3); }
        .btn:active { transform: scale(.98); opacity:.85; }
        .btn.primary {
          background: var(--blue); color: #fff;
          border-color: var(--blue);
          box-shadow: 0 1px 3px rgba(37,99,235,.3);
        }
        .btn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }

        /* ── TIP BOX ── */
        .tip-box {
          background: var(--blue-light);
          border-radius: var(--radius-sm);
          border: 1px solid #BFDBFE;
          padding: 13px 14px; margin-top: 12px;
          font-size: 13px; line-height: 1.6; color: #1E40AF;
        }
        .tip-box strong { font-weight: 600; display: block; margin-bottom: 3px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; }

        /* ── MAP / QUESTION CARDS ── */
        .question-map-card {
          background: var(--white); border-radius: var(--radius);
          border: 1px solid var(--border); padding: 18px; margin-bottom: 14px;
          box-shadow: var(--shadow-sm);
        }
        .focal-question {
          font-size: 13px; font-weight: 600; color: var(--blue);
          background: var(--blue-light); border-radius: var(--radius-sm);
          padding: 10px 13px; margin-bottom: 14px; line-height: 1.55;
          border-left: 3px solid var(--blue);
        }
        .focal-question span {
          font-size: 10px; font-weight: 600; color: var(--blue-mid);
          text-transform: uppercase; letter-spacing: .08em;
          display: block; margin-bottom: 4px;
        }
        .map-btn {
          flex: 0 0 auto; padding: 9px 14px; font-size: 13px; font-weight: 600;
          border: 1px solid var(--blue); border-radius: var(--radius-sm);
          background: var(--blue); color: #fff; cursor: pointer;
          transition: all .15s; font-family: var(--font);
        }
        .map-btn:hover { background: var(--blue-dark); }

        /* ── INPUTS ── */
        .input-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .input-row input, .input-row select {
          padding: 9px 11px; font-size: 13px; font-family: var(--font);
          border: 1px solid var(--border); border-radius: var(--radius-sm);
          background: var(--bg); color: var(--text);
          -webkit-appearance: none; min-width: 0;
          transition: border-color .15s;
        }
        .input-row input:focus, .input-row select:focus {
          outline: none; border-color: var(--border-focus);
          box-shadow: 0 0 0 3px rgba(37,99,235,.08);
        }

        /* ── NODE PILLS ── */
        .node-pills { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; min-height: 10px; }
        .node-pill {
          display: inline-flex; align-items: center; gap: 4px;
          border-radius: 20px; padding: 4px 10px;
          font-size: 11px; font-weight: 600;
        }
        .node-pill button {
          background: none; border: none; font-size: 13px;
          cursor: pointer; padding: 0; line-height: 1; opacity: .6;
        }

        /* ── LINK LIST ── */
        .link-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
        .link-item {
          display: flex; align-items: center; gap: 6px; font-size: 12px;
          color: var(--text2); background: var(--bg2); border-radius: var(--radius-xs);
          padding: 6px 10px; border: 1px solid var(--border);
        }
        .link-item button {
          margin-left: auto; background: none; border: none;
          color: var(--text3); font-size: 15px; cursor: pointer; padding: 0; line-height: 1;
        }

        /* ── LABELS ── */
        .section-label {
          font-size: 10px; font-weight: 600; color: var(--text3);
          text-transform: uppercase; letter-spacing: .08em; margin: 12px 0 6px;
        }
        .map-hint { font-size: 11px; color: var(--text3); margin-top: 5px; }

        /* ── SUMMARY ── */
        .summary-card {
          background: var(--bg2); border-radius: var(--radius-sm);
          border: 1px solid var(--border); padding: 14px;
          font-size: 13px; line-height: 1.7; color: var(--text);
          max-height: 200px; overflow-y: auto; white-space: pre-wrap;
        }
    </style>
<body>
<div id="debug" style="display:none;">Caricamento...</div>

<script>
    window.onerror = function(msg, src, line) {
      document.getElementById('debug').style.background = '#c00';
      document.getElementById('debug').textContent = 'Errore linea ' + line + ': ' + msg;
      return true;
    };

    document.getElementById('debug').textContent = 'Step 1: costanti';

    const PHASES = [
      { id:'preview', letter:'P', name:'Panoramica',
        desc:'Scorri rapidamente il testo: titoli, sottotitoli, immagini, parole in grassetto. Costruisci una prima impressione prima di leggere.',
        prompt:'Annota gli elementi principali che hai individuato (titoli, sezioni, parole chiave):',
        ph:'Es: Capitolo 5 — La Rivoluzione Francese\nSezioni: cause, eventi principali, conseguenze\nParole chiave: rivoluzione, terzo stato, Bastiglia, Dichiarazione...',
        tip:'Non leggere il testo per intero. Scorri velocemente come se stessi sfogliando un giornale.' },
      { id:'question', letter:'D', name:'Domande',
        desc:'Trasforma i titoli e i concetti in domande focali. Ogni domanda diventerà il centro di una mappa concettuale.',
        prompt:'Scrivi le tue domande focali (una per riga):',
        ph:'Es:\nQuali furono le cause della Rivoluzione Francese?\nChi era il Terzo Stato e cosa chiedeva?\nCome cambiò la società dopo la Rivoluzione?',
        tip:'Ogni domanda diventerà il centro di una mappa. Formulale in modo preciso e concreto.' },
      { id:'read', letter:'L', name:'Lettura',
        desc:'Leggi attivamente cercando risposta alle tue domande. Annota i concetti chiave e le definizioni importanti.',
        prompt:'Concetti chiave, definizioni e parole-segnale trovati durante la lettura:',
        ph:'Es:\n– Terzo Stato: 98% della popolazione, pagava le tasse\n– Cahiers de doléances: quaderni delle lamentele presentati al re\n– Presa della Bastiglia: 14 luglio 1789, simbolo della rivoluzione\n– Dichiarazione dei diritti: libertà, uguaglianza, fraternità',
        tip:'Usa il trattino – per ogni concetto. Scrivi con parole tue, non copiare dal testo.' },
      { id:'reflect', letter:'R', name:'Riflessione',
        desc:'Per ciascuna domanda focale costruisci una mappa concettuale collegando i concetti con proposizioni.',
        prompt:'', ph:'', tip:'' },
      { id:'recite', letter:'R', name:'Ripetizione',
        desc:'Senza guardare il testo, rispondi a ciascuna domanda focale con parole tue. Questo consolida la memoria.',
        prompt:'', ph:'', tip:'Se non ricordi la risposta a una domanda, scrivi ? — saprai su cosa ripassare.' },
      { id:'review', letter:'R', name:'Revisione',
        desc:'Rivedi il materiale e sintetizza in tre parti: concetti fondamentali, connessioni tra i concetti, lacune da ripassare.',
        prompt:'', ph:'', tip:'' }
    ];

    const COLORS = ['#185FA5','#1D9E75','#D4537E','#BA7517','#533AB7','#D85A30'];
    const COLOR_NAMES = ['blu','verde','rosa','ambra','viola','corallo'];
    const STORAGE_KEY = 'pq4r_sessions';

    let S = { phase:0, answers:{}, maps:{}, reciteAnswers:{}, reviewParts:{}, sessionTimer:0, timerStart:null };
    let _timerInterval = null;

    document.getElementById('debug').textContent = 'Step 2: funzioni base';

    function getQuestions() {
      return (S.answers['question']||'').split('\n').map(q=>q.trim()).filter(q=>q.length>0);
    }

    function ensureMap(qi) {
      if (!S.maps[qi]) S.maps[qi] = { nodes:[], links:[] };
      return S.maps[qi];
    }

    // ---- TIMER ----
    function startTimer() {
      if (_timerInterval) clearInterval(_timerInterval);
      S.timerStart = Date.now();
      _timerInterval = setInterval(function() {
        var elapsed = Math.floor((Date.now() - S.timerStart) / 1000);
        updateTimerDisplay(elapsed);
      }, 1000);
      updateTimerDisplay(0);
    }

    function stopTimer() {
      if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
      if (S.timerStart) {
        S.sessionTimer = (S.sessionTimer||0) + Math.floor((Date.now()-S.timerStart)/1000);
        S.timerStart = null;
      }
    }

    function updateTimerDisplay(extra) {
      var el = document.getElementById('timer-display');
      if (!el) return;
      var total = (S.sessionTimer||0) + (extra||0);
      var h = Math.floor(total/3600), m = Math.floor((total%3600)/60), s = total%60;
      el.textContent = h>0
        ? h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')
        : m+':'+String(s).padStart(2,'0');
    }

    function formatDuration(sec) {
      var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
      if(h>0) return h+'h '+m+'m';
      if(m>0) return m+'m '+s+'s';
      return s+'s';
    }

    // ---- SCORE ----
    function computeScore() {
      var questions = getQuestions();
      var total=0, done=0;
      ['preview','question','read','recite','review'].forEach(function(id) {
        total+=5; if((S.answers[id]||'').trim().length>10) done+=5;
      });
      questions.forEach(function(_,qi) {
        total+=3;
        var m=S.maps[qi];
        if(m&&m.nodes.length>=2&&m.links.length>=1) done+=3;
        total+=2;
        var ans=S.reciteAnswers&&S.reciteAnswers[qi];
        if(ans&&ans.trim().length>5) done+=2;
      });
      var rp=S.reviewParts||{};
      ['fondamentali','connessioni','lacune'].forEach(function(k) {
        total+=1; if((rp[k]||'').trim().length>5) done+=1;
      });
      return total>0 ? Math.round((done/total)*100) : 0;
    }

    function scoreColor(pct) {
      if(pct>=80) return '#1D9E75';
      if(pct>=50) return '#BA7517';
      return '#D85A30';
    }

    // ---- SESSION STORAGE ----
    function loadAllSessions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
      catch(e) { return []; }
    }

    function saveAllSessions(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) { console.warn('Storage pieno o non disponibile:', e); } }

    function saveCurrentSession() {
      if (!S.sessionId) return;
      var sessions = loadAllSessions();
      var idx = sessions.findIndex(function(s){return s.id===S.sessionId;});
      var totalSec = (S.sessionTimer||0) + (S.timerStart ? Math.floor((Date.now()-S.timerStart)/1000) : 0);
      var session = {
        id: S.sessionId, name: S.sessionName||'Sessione',
        updatedAt: Date.now(), exported: S.exported||false,
        score: computeScore(), totalSeconds: totalSec,
        phase: S.phase, answers: S.answers, maps: S.maps,
        reciteAnswers: S.reciteAnswers||{}, reviewParts: S.reviewParts||{},
        reflectActive: S.reflectActive||null, reciteActive: S.reciteActive||null,
        sessionTimer: totalSec
      };
      if(idx>=0) sessions[idx]=session; else sessions.unshift(session);
      saveAllSessions(sessions);
      updateBadge();
    }

    function loadSession(id) {
      var sessions = loadAllSessions();
      var s = sessions.find(function(s){return s.id===id;});
      if(!s) return;
      S.sessionId=s.id; S.sessionName=s.name; S.exported=s.exported||false;
      S.phase=s.phase||0; S.answers=s.answers||{}; S.maps=s.maps||{};
      S.reciteAnswers=s.reciteAnswers||{}; S.reviewParts=s.reviewParts||{};
      S.sessionTimer=s.sessionTimer||0; S.timerStart=null;
      S.reflectActive=s.reflectActive||null; S.reciteActive=s.reciteActive||null;
    }

    function deleteSession(id) {
      saveAllSessions(loadAllSessions().filter(function(s){return s.id!==id;}));
    }

    function countUnexported() {
      return loadAllSessions().filter(function(s){return !s.exported;}).length;
    }

    function updateBadge() {
      var n=countUnexported();
      var badge=document.getElementById('home-badge');
      if(!badge) return;
      badge.textContent=n>0?n:'';
      badge.style.display=n>0?'flex':'none';
    }

    document.getElementById('debug').textContent = 'Step 3: render functions';

    // ---- DETTATURA VOCALE ----
    var _activeMicId = null;

    function toggleDictation(taId) {
      if(_activeMicId === taId) {
        // Secondo tocco: niente da fare, l'intent è già partito
        return;
      }
      var ta = document.getElementById(taId);
      if(!ta) return;
      var btn = document.getElementById('mic-' + taId);

      // Usa il bridge Android (RecognizerIntent — funziona offline)
      if(typeof Android !== 'undefined' && typeof Android.startDictation === 'function') {
        _activeMicId = taId;
        if(btn) { btn.style.background='#FCEBEB'; btn.style.color='#A32D2D'; btn.innerHTML='&#9209;'; }
        Android.startDictation(taId);
      } else {
        // Fallback: Web Speech API (richiede connessione)
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) { alert('Riconoscimento vocale non disponibile.'); return; }
        _activeMicId = taId;
        var rec = new SR();
        rec.lang = 'it-IT';
        rec.interimResults = false;
        var base = ta.value;
        rec.onstart = function() {
          if(btn) { btn.style.background='#FCEBEB'; btn.style.color='#A32D2D'; btn.innerHTML='&#9209;'; }
        };
        rec.onresult = function(e) {
          var txt = '';
          for(var i=0;i<e.results.length;i++) txt += e.results[i][0].transcript;
          ta.value = base + (base && !base.endsWith(' ') ? ' ' : '') + txt;
          ta.dispatchEvent(new Event('input',{bubbles:true}));
        };
        rec.onerror = function(e) { alert('Errore: '+e.error); stopDictation(); };
        rec.onend = function() { stopDictation(); };
        rec.start();
      }
    }

    // Chiamata da Java quando la dettatura è completata
    function onDictationResult(text, targetId) {
      var ta = document.getElementById(targetId);
      if(ta && text) {
        var base = ta.value;
        ta.value = base + (base && !base.endsWith(' ') ? ' ' : '') + text;
        ta.dispatchEvent(new Event('input',{bubbles:true}));
      }
      stopDictation();
    }

    function stopDictation() {
      if(_activeMicId) {
        var btn = document.getElementById('mic-' + _activeMicId);
        if(btn) { btn.style.background=''; btn.style.color=''; btn.innerHTML='&#127908;'; }
      }
      _activeMicId = null;
    }

    // ---- TASTIERA MATEMATICA ----
    var _mathTarget = null;

    var MATH_SYMBOLS = [
      // Operatori non presenti su tastiera Android
      ['×','×'], ['÷','÷'], ['±','±'], ['≠','≠'], ['≈','≈'],
      ['≤','≤'], ['≥','≥'], ['∝','∝'],
      // Simboli matematici
      ['√','√'], ['∛','∛'], ['∞','∞'], ['°','°'], ['∆','∆'],
      ['∑','∑'], ['∫','∫'], ['∂','∂'], ['∇','∇'],
      // Frecce
      ['→','→'], ['←','←'], ['↔','↔'], ['⇒','⇒'], ['⇔','⇔'],
      // Insiemi
      ['∈','∈'], ['∉','∉'], ['⊂','⊂'], ['⊃','⊃'], ['∪','∪'], ['∩','∩'], ['∅','∅'],
      // Lettere greche
      ['α','α'], ['β','β'], ['γ','γ'], ['θ','θ'], ['λ','λ'],
      ['μ','μ'], ['ρ','ρ'], ['σ','σ'], ['φ','φ'], ['ω','ω'],
      ['Σ','Σ'], ['Π','Π'], ['Ω','Ω'], ['Γ','Γ'], ['Δ','Δ'],
      // Vettori/prodotti
      ['·','·'], ['∧','∧'],
    ];

    function showMathKeyboard(taId) {
      _mathTarget = taId;

        build: function(v) {
          var n=v[0], d=v[1];
          var sup={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'};
          var sub={'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};
          if(/^-?\d+$/.test(n)&&/^-?\d+$/.test(d)) {
            return n.split('').map(function(c){return sup[c]||c;}).join('')+'\u2044'+d.split('').map(function(c){return sub[c]||c;}).join('');
          }
          return n+'\u2044'+d;
        }
      },
      {
        id: 'pow', label: 'Potenza', preview: 'xⁿ',
        fields: [{id:'pb', label:'Base', ph:'es: x, (a+b), 10'}, {id:'pe', label:'Esponente', ph:'es: 2, n, -1'}],

          return v[0]+v[1].split('').map(function(c){return sup[c]||c;}).join('');
        }
      },
      {
        id: 'vec', label: 'Vettore', preview: 'v̄',
        fields: [{id:'vl', label:'Lettera / simbolo', ph:'es: v, F, AB'}],

      },
      {
        id: 'modvec', label: 'Modulo vettore', preview: '|v̄|',
        fields: [{id:'mv', label:'Lettera / simbolo', ph:'es: v, F'}],

        fields: [{id:'ri', label:'Indice (vuoto = quadrata)', ph:'es: 3 per cubica'}, {id:'ra', label:'Argomento', ph:'es: x, a+b'}],
        build: function(v) {
          var sup={'2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','n':'ⁿ','k':'ᵏ'};
          var idx=v[0]?v[0]:'';

        build: function(v) {

          var base=v[0];
          var baseS=base?'log'+base.split('').map(function(c){return sub[c]||c;}).join('') : 'log';
          return baseS+v[1];
        }
      },
      {
        id: 'abs', label: 'Valore assoluto', preview: '|x|',
        fields: [{id:'av', label:'Espressione', ph:'es: x, a-b, x²-1'}],

        build: function(v) { return 'lim('+v[0]+'\u2192'+v[1]+') '+v[2]; }

    // ---- MAP ENGINE ----
    function autoLayout(qi) {
      var map=S.maps[qi]; if(!map||map.nodes.length===0) return;
      var svg=getMapSVG(qi);
      var vb=svg?svg.viewBox.baseVal:null;
      var CW=vb?vb.width:700, CH=vb?vb.height:600;

      var nodes=map.nodes, n=nodes.length;
      if(n===1){ nodes[0].x=CW/2; nodes[0].y=80; return; }

      // Costruisce grafo bidirezionale per trovare la radice migliore
      var outDeg={}, inDeg={}, children={}, parents={};
      nodes.forEach(function(nd){ outDeg[nd.id]=0; inDeg[nd.id]=0; children[nd.id]=[]; parents[nd.id]=[]; });
      map.links.forEach(function(lk){
        outDeg[lk.from]=(outDeg[lk.from]||0)+1;
        inDeg[lk.to]=(inDeg[lk.to]||0)+1;
        if(children[lk.from]) children[lk.from].push(lk.to);
        if(parents[lk.to]) parents[lk.to].push(lk.from);
      });

      // Radice = nodo con più figli e meno genitori (più in alto nella gerarchia)
      var root=nodes[0].id;
      nodes.forEach(function(nd){
        if((outDeg[nd.id]||0) - (inDeg[nd.id]||0) > (outDeg[root]||0) - (inDeg[root]||0))
          root=nd.id;
      });

      // BFS per assegnare livelli
      var levels={}, levelNodes={};
      nodes.forEach(function(nd){ levels[nd.id]=-1; });
      var queue=[root]; levels[root]=0;
      var visited={}; visited[root]=true;
      while(queue.length){
        var cur=queue.shift();
        var lv=levels[cur];
        if(!levelNodes[lv]) levelNodes[lv]=[];
        levelNodes[lv].push(cur);
        (children[cur]||[]).forEach(function(cid){
          if(!visited[cid]){ visited[cid]=true; levels[cid]=lv+1; queue.push(cid); }
        });
      }
      // Nodi senza collegamento → livello extra
      var maxLv=0;
      Object.keys(levelNodes).forEach(function(l){ maxLv=Math.max(maxLv,parseInt(l)); });
      nodes.forEach(function(nd){
        if(levels[nd.id]<0){ levels[nd.id]=maxLv+1; if(!levelNodes[maxLv+1]) levelNodes[maxLv+1]=[]; levelNodes[maxLv+1].push(nd.id); }
      });

      // Calcola dimensioni nodi per spaziatura corretta
      function nodeW(nd) {
        var words=(nd.label||'').split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur);
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        return Math.max(60,maxLen*7+20);
      }
      function nodeH(nd) {
        var words=(nd.label||'').split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur);
        return lines.length*14+20;
      }

      var totalLevels=maxLv+2;
      var levelSpacingY=Math.max(70, Math.floor((CH-80)/Math.max(totalLevels,1)));

      // Posiziona i nodi livello per livello
      Object.keys(levelNodes).sort(function(a,b){return a-b;}).forEach(function(lv){
        var ids=levelNodes[lv];
        var lvNodes=ids.map(function(id){ return nodes.find(function(n){return n.id===id;}); }).filter(Boolean);
        // Calcola larghezza totale necessaria
        var totalW=lvNodes.reduce(function(s,nd){ return s+nodeW(nd)+24; },0);
        var startX=Math.max(40, (CW-totalW)/2);
        var y=60+parseInt(lv)*levelSpacingY;
        var cx=startX;
        lvNodes.forEach(function(nd){
          var nw=nodeW(nd);
          nd.x=Math.round(cx+nw/2);
          nd.y=Math.round(y);
          cx+=nw+24;
        });
      });
    }

    // Calcola il punto di intersezione di una freccia con il bordo di un nodo rettangolare
    // Entra dal bordo più vicino nella direzione della freccia
    function nodeEdgePoint(from, to, nd, isTarget) {
      var words=(nd.label||'').split(' '), lines=[], cur='';
      words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
      if(cur) lines.push(cur); if(lines.length===0) lines=[''];
      var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
      var nw=Math.max(60,maxLen*7+20)/2;  // metà larghezza
      var nh=(lines.length*14+20)/2;       // metà altezza

      var dx=to.x-from.x, dy=to.y-from.y;
      if(dx===0&&dy===0) return {x:nd.x, y:nd.y};

      // Calcola t di intersezione con i 4 bordi del rettangolo
      var cx=nd.x, cy=nd.y;
      var ox=isTarget?to.x:from.x, oy=isTarget?to.y:from.y;  // origine del raggio
      var rx=isTarget?-dx:dx, ry=isTarget?-dy:dy;  // direzione verso il centro del nodo

      var ts=[];
      if(rx!==0){ ts.push((cx-nw-ox)/rx); ts.push((cx+nw-ox)/rx); }
      if(ry!==0){ ts.push((cy-nh-oy)/ry); ts.push((cy+nh-oy)/ry); }
      ts=ts.filter(function(t){ return t>0; }).sort(function(a,b){return a-b;});

      if(ts.length===0) return {x:nd.x, y:nd.y};
      var t=ts[0];
      var px=ox+rx*t, py=oy+ry*t;
      // Clamp ai bordi
      px=Math.max(cx-nw,Math.min(cx+nw,px));
      py=Math.max(cy-nh,Math.min(cy+nh,py));
      return {x:px, y:py};
    }

    function renderMapOnSVG(map, svg, qi) {
      if(!map||!svg) return;
      _mapState.qi = qi;
      svg.innerHTML = '';
      var ns='http://www.w3.org/2000/svg';
      var vb=svg.viewBox.baseVal;
      var W=vb.width||700, H=vb.height||600;
      var vbX=vb.x||0, vbY=vb.y||0;

      // Stile mappa salvato
      var mapBg    = map.bg        || '#F8F7F2';
      var lineColor= map.lineColor || '#B4B2A9';
      var lineStyle= map.lineStyle || 'solid';
      var textColor= map.textColor || 'auto'; // 'auto' = usa colore nodo
      var dashArray= lineStyle==='dashed'?'8,5':lineStyle==='dotted'?'2,4':'none';

      // Sfondo
      var bgRect=document.createElementNS(ns,'rect');
      bgRect.setAttribute('class','map-bg');
      bgRect.setAttribute('x',vbX); bgRect.setAttribute('y',vbY);
      bgRect.setAttribute('width',W+Math.abs(vbX)*2); bgRect.setAttribute('height',H+Math.abs(vbY)*2);
      bgRect.setAttribute('fill',mapBg);
      svg.appendChild(bgRect);

      // Arrow marker (fine freccia)
      var defs=document.createElementNS(ns,'defs');
      var mk=document.createElementNS(ns,'marker');
      mk.setAttribute('id','arr'+qi); mk.setAttribute('markerWidth','8');
      mk.setAttribute('markerHeight','8'); mk.setAttribute('refX','7');
      mk.setAttribute('refY','3'); mk.setAttribute('orient','auto');
      var mp=document.createElementNS(ns,'path');
      mp.setAttribute('d','M0,0 L0,6 L8,3 z'); mp.setAttribute('fill',lineColor);
      mk.appendChild(mp); defs.appendChild(mk);
      // Arrow marker (inizio freccia — bidirezionale)
      var mkS=document.createElementNS(ns,'marker');
      mkS.setAttribute('id','arr-start'+qi); mkS.setAttribute('markerWidth','8');
      mkS.setAttribute('markerHeight','8'); mkS.setAttribute('refX','1');
      mkS.setAttribute('refY','3'); mkS.setAttribute('orient','auto');
      var mpS=document.createElementNS(ns,'path');
      mpS.setAttribute('d','M8,0 L8,6 L0,3 z'); mpS.setAttribute('fill',lineColor);
      mkS.appendChild(mpS); defs.appendChild(mkS);
      svg.appendChild(defs);

      // Draw links
      map.links.forEach(function(lk, li) {
        var fn=map.nodes.find(function(n){return n.id===lk.from;}),
            tn=map.nodes.find(function(n){return n.id===lk.to;});
        if(!fn||!tn) return;
        var dx=tn.x-fn.x, dy=tn.y-fn.y;
        var p1=nodeEdgePoint(fn,tn,fn,false), p2=nodeEdgePoint(fn,tn,tn,true);
        var x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y;
        var mx=(x1+x2)/2, my=(y1+y2)/2;
        var g=document.createElementNS(ns,'g');
        g.style.cursor='pointer';
        g.setAttribute('data-link', lk.from+'-'+lk.to+'-'+li);
        var line=document.createElementNS(ns,'line');
        line.setAttribute('x1',x1);line.setAttribute('y1',y1);
        line.setAttribute('x2',x2);line.setAttribute('y2',y2);
        line.setAttribute('stroke',lineColor);line.setAttribute('stroke-width','2');
        if(dashArray!=='none') line.setAttribute('stroke-dasharray',dashArray);
        line.setAttribute('marker-end','url(#arr'+qi+')');
        if(lk.bidir) line.setAttribute('marker-start','url(#arr-start'+qi+')');
        // Invisible hit area
        var hit=document.createElementNS(ns,'line');
        hit.setAttribute('x1',x1);hit.setAttribute('y1',y1);
        hit.setAttribute('x2',x2);hit.setAttribute('y2',y2);
        hit.setAttribute('stroke','transparent');hit.setAttribute('stroke-width','18');
        g.appendChild(line);
        if(lk.label) {
          var lw=Math.min(lk.label.length*5.5+12,110);
          var bg=document.createElementNS(ns,'rect');
          bg.setAttribute('x',mx-lw/2);bg.setAttribute('y',my-9);
          bg.setAttribute('width',lw);bg.setAttribute('height',16);
          bg.setAttribute('rx','4');bg.setAttribute('fill','#EFEDE6');
          var lt=document.createElementNS(ns,'text');
          lt.setAttribute('x',mx);lt.setAttribute('y',my+4);
          lt.setAttribute('text-anchor','middle');lt.setAttribute('font-size','9');
          lt.setAttribute('font-style','italic');lt.setAttribute('fill','#5F5E5A');
          lt.textContent=lk.label.length>18?lk.label.slice(0,17)+'\u2026':lk.label;
          g.appendChild(bg);g.appendChild(lt);
        }
        g.appendChild(hit);
        (function(idx){ g.addEventListener('click', function(e){ e.stopPropagation(); removeLink(qi,idx); }); })(li);
        svg.appendChild(g);
      });

      // Draw nodes
      map.nodes.forEach(function(nd) {
        var label=nd.label||'', c=COLORS[nd.color||0];
        var isSelected=_mapState.selected===nd.id, isFirst=_mapState.firstNode===nd.id;
        var words=label.split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur);
        if(lines.length===0) lines=[''];
        var lineH=14, padding=10;
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        var w=Math.max(60, maxLen*7+padding*2);
        var h=lines.length*lineH+padding*2;

        var g=document.createElementNS(ns,'g');
        g.style.cursor='grab';

        // Rettangolo nodo
        var rect=document.createElementNS(ns,'rect');
        rect.setAttribute('x',nd.x-w/2);rect.setAttribute('y',nd.y-h/2);
        rect.setAttribute('width',w);rect.setAttribute('height',h);
        rect.setAttribute('rx','8');
        rect.setAttribute('fill', isFirst?c+'55':isSelected?c+'44':c+'20');
        rect.setAttribute('stroke', isSelected||isFirst?c:c+'88');
        rect.setAttribute('stroke-width', isSelected||isFirst?'3':'1.8');
        g.appendChild(rect);

        // Testo multiriga
        var txt=document.createElementNS(ns,'text');
        txt.setAttribute('x',nd.x);
        txt.setAttribute('y', nd.y - (lines.length-1)*lineH/2 + 4);
        txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','11');
        txt.setAttribute('fill', textColor==='auto'?c:textColor);
        txt.setAttribute('font-weight','700');
        if(lines.length===1) {
          txt.textContent=lines[0];
        } else {
          lines.forEach(function(line,li){
            var ts=document.createElementNS(ns,'tspan');
            ts.setAttribute('x',nd.x);
            ts.setAttribute('dy', li===0?'0':'14');
            ts.textContent=line;
            txt.appendChild(ts);
          });
        }
        g.appendChild(txt);

        // Icona immagine sotto il nodo (se ha immagine)
        if(nd.image) {
          var iconG=document.createElementNS(ns,'g');
          iconG.style.cursor='pointer';
          var iconBg=document.createElementNS(ns,'rect');
          var iw=22, ih=16;
          iconBg.setAttribute('x',nd.x-iw/2); iconBg.setAttribute('y',nd.y+h/2+3);
          iconBg.setAttribute('width',iw); iconBg.setAttribute('height',ih);
          iconBg.setAttribute('rx','3'); iconBg.setAttribute('fill',c+'33');
          iconBg.setAttribute('stroke',c); iconBg.setAttribute('stroke-width','1');
          var iconTxt=document.createElementNS(ns,'text');
          iconTxt.setAttribute('x',nd.x); iconTxt.setAttribute('y',nd.y+h/2+14);
          iconTxt.setAttribute('text-anchor','middle'); iconTxt.setAttribute('font-size','10');
          iconTxt.textContent='\uD83D\uDDBC';
          iconG.appendChild(iconBg); iconG.appendChild(iconTxt);
          (function(nodeId){
            // stoppa mousedown per non avviare drag del nodo
            iconG.addEventListener('mousedown', function(e){ e.stopPropagation(); e.preventDefault(); });
            iconG.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive:true});
            iconG.addEventListener('click', function(e){ e.stopPropagation(); openImagePopup(nodeId, qi); });
          })(nd.id);
          svg.appendChild(iconG);
        }

        addNodeEvents(g, nd.id, qi);
        svg.appendChild(g);
      });

      // Empty state hint
      if(map.nodes.length===0) {
        var t=document.createElementNS(ns,'text');
        t.setAttribute('x',W/2);t.setAttribute('y',H/2-10);
        t.setAttribute('text-anchor','middle');t.setAttribute('font-size','13');
        t.setAttribute('fill','#B4B2A9');t.textContent='Aggiungi concetti con il pulsante +';
        svg.appendChild(t);
      }

      // Click on SVG background = deselect + chiudi popup immagine
      svg.addEventListener('click', function(e){
        if(e.target===svg) {
          var p=document.getElementById('img-popup'); if(p) p.remove();
          _mapState.selected=null; _mapState.firstNode=null; _mapState.linkMode=false;
          renderMap(qi); updateLinkPrompt(qi);
        }
      });

      // ── PINCH TO ZOOM ──────────────────────────────────────
      var _pinch = null; // { dist, cx, cy, vb }

      function pinchDist(e) {
        var t=e.touches;
        var dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
        return Math.sqrt(dx*dx+dy*dy);
      }
      function pinchCenter(e) {
        var t=e.touches;
        return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 };
      }

      svg.addEventListener('touchstart', function(e){
        if(e.touches.length===2) {
          e.preventDefault();
          var vb=svg.viewBox.baseVal;
          _pinch={ dist:pinchDist(e), vb:{ x:vb.x, y:vb.y, w:vb.width, h:vb.height }, center:pinchCenter(e) };
          // Cancella eventuale drag nodo in corso
          _mapState.dragNode=null;
        }
      }, {passive:false});

      svg.addEventListener('touchmove', function(e){
        if(e.touches.length===2 && _pinch) {
          e.preventDefault();
          var newDist=pinchDist(e);
          var scale=_pinch.dist/newDist; // >1 = zoom out, <1 = zoom in
          var r=svg.getBoundingClientRect();
          // Centro del pinch in coordinate SVG
          var pc=_pinch.center;
          var scaleX=_pinch.vb.w/r.width, scaleY=_pinch.vb.h/r.height;
          var svgCx=_pinch.vb.x+(pc.x-r.left)*scaleX;
          var svgCy=_pinch.vb.y+(pc.y-r.top)*scaleY;
          // Nuovo viewBox centrato sul pinch
          var newW=Math.max(150,Math.min(2000,_pinch.vb.w*scale));
          var newH=Math.max(120,Math.min(1600,_pinch.vb.h*scale));
          var newX=svgCx-newW*(svgCx-_pinch.vb.x)/_pinch.vb.w;
          var newY=svgCy-newH*(svgCy-_pinch.vb.y)/_pinch.vb.h;
          svg.setAttribute('viewBox',newX+' '+newY+' '+newW+' '+newH);
        }
      }, {passive:false});

      svg.addEventListener('touchend', function(e){
        if(e.touches.length<2) _pinch=null;
      }, {passive:false});
    }

    function getSVGPoint(e, svg) {
      var r = svg.getBoundingClientRect();
      var vb = svg.viewBox.baseVal;
      // Usa changedTouches per touchend (touches è vuoto al rilascio)
      var touch = e.changedTouches ? e.changedTouches[0] : (e.touches ? e.touches[0] : e);
      var cx = touch.clientX;
      var cy = touch.clientY;
      // Scala: quanti unità SVG per pixel CSS
      var scaleX = vb.width  / r.width;
      var scaleY = vb.height / r.height;
      // Converti coordinate client → coordinate SVG (tenendo conto dell'offset viewBox)
      return {
        x: vb.x + (cx - r.left) * scaleX,
        y: vb.y + (cy - r.top)  * scaleY
      };
    }

    function addNodeEvents(g, nodeId, qi) {
      var startX=0, startY=0, offsetX=0, offsetY=0;
      var moved=false, dragActive=false;
      var THRESHOLD = 6;
      var _dblPending = false;

      function onStart(e) {
        if(e.button !== undefined && e.button !== 0) return;
        e.preventDefault(); e.stopPropagation();
        var svg=getMapSVG(qi);
        var pt=getSVGPoint(e,svg);
        startX=pt.x; startY=pt.y; moved=false; dragActive=false;
        var map=S.maps[qi];
        var nd=map&&map.nodes.find(function(n){return n.id===nodeId;});
        if(nd) { offsetX=pt.x-nd.x; offsetY=pt.y-nd.y; }
        _mapState.dragNode=nodeId;
        if(!e.touches) {
          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup',   onMouseUp);
          g.style.cursor='grabbing';
        }
      }

      function doMove(pt) {
        var dx=pt.x-startX, dy=pt.y-startY;
        if(!dragActive && (Math.abs(dx)>THRESHOLD||Math.abs(dy)>THRESHOLD)) {
          dragActive=true; moved=true;
        }
        if(dragActive) {
          var map=S.maps[qi]; if(!map) return;
          var nd=map.nodes.find(function(n){return n.id===nodeId;});
          if(!nd) return;
          nd.x=Math.round(pt.x-offsetX);
          nd.y=Math.round(pt.y-offsetY);
          var rect=g.querySelector('rect');
          var txt=g.querySelector('text');
          if(rect){
            var w=parseFloat(rect.getAttribute('width'));
            var h=parseFloat(rect.getAttribute('height'));
            rect.setAttribute('x',nd.x-w/2);
            rect.setAttribute('y',nd.y-h/2);
          }
          if(txt){
            txt.setAttribute('x',nd.x);
            txt.querySelectorAll('tspan').forEach(function(ts){ ts.setAttribute('x',nd.x); });
            txt.setAttribute('y', nd.y+4);
          }
          updateMapLinks(qi);
        }
      }

      function onTouchMove(e) {
        if(_mapState.dragNode!==nodeId) return;
        e.preventDefault();
        doMove(getSVGPoint(e, getMapSVG(qi)));
      }

      function onMouseMove(e) {
        if(_mapState.dragNode!==nodeId) return;
        doMove(getSVGPoint(e, getMapSVG(qi)));
      }

      function doEnd(fromDbl) {
        if(_mapState.dragNode!==nodeId) return;
        _mapState.dragNode=null;
        g.style.cursor='grab';
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
        if(moved) {
          renderMap(qi);
          saveCurrentSession();
        } else if(!fromDbl) {
          // singolo click: seleziona/collega solo se non è un dblclick in arrivo
          _dblPending = true;
          setTimeout(function() {
            if(_dblPending) { _dblPending=false; handleNodeTap(nodeId, qi); }
          }, 220);
        }
      }

      function onMouseUp(e)  { doEnd(false); }
      function onTouchEnd(e) { if(_mapState.dragNode===nodeId) doEnd(false); }

      // dblclick: cancella il singolo click pendente e apre modifica
      g.addEventListener('dblclick', function(e) {
        e.preventDefault(); e.stopPropagation();
        _dblPending = false; // cancella il singolo click
        _mapState.lastTap=null; _mapState.firstNode=null;
        _mapState.selected=null; _mapState.linkMode=false;
        editNode(qi, nodeId);
      });

      g.addEventListener('touchstart', onStart,     {passive:false});
      g.addEventListener('touchmove',  onTouchMove, {passive:false});
      g.addEventListener('touchend',   onTouchEnd,  {passive:false});
      g.addEventListener('mousedown',  onStart);
    }

    // Aggiorna le frecce in-place durante il drag — nessun remove/create, solo setAttribute
    function updateMapLinks(qi) {
      var svg=getMapSVG(qi); if(!svg) return;
      var map=S.maps[qi]; if(!map) return;

      var fromCount={};
      map.links.forEach(function(lk){ fromCount[lk.from]=(fromCount[lk.from]||0)+1; });
      var fromIndex={};

      map.links.forEach(function(lk, li){
        var fn=map.nodes.find(function(n){return n.id===lk.from;});
        var tn=map.nodes.find(function(n){return n.id===lk.to;});
        if(!fn||!tn) return;
        var dx=tn.x-fn.x, dy=tn.y-fn.y;
        var p1=nodeEdgePoint(fn,tn,fn,false), p2=nodeEdgePoint(fn,tn,tn,true);
        var x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y;
        var mx=(x1+x2)/2, my=(y1+y2)/2;
        var key=lk.from+'-'+lk.to+'-'+li;
        var g=svg.querySelector('[data-link="'+key+'"]');
        if(!g) return;
        // Aggiorna tutte le line nel gruppo (visibile + hit area)
        var lines=g.querySelectorAll('line');
        lines.forEach(function(l){
          l.setAttribute('x1',x1); l.setAttribute('y1',y1);
          l.setAttribute('x2',x2); l.setAttribute('y2',y2);
        });
        // Aggiorna posizione etichetta se presente
        var rect=g.querySelector('rect');
        var txt=g.querySelector('text');
        if(rect){ rect.setAttribute('x',mx-parseFloat(rect.getAttribute('width'))/2); rect.setAttribute('y',my-9); }
        if(txt){ txt.setAttribute('x',mx); txt.setAttribute('y',my+4); }
      });
    }


    function handleNodeTap(nodeId, qi) {
      var now = Date.now();
      if(_mapState.lastTap && _mapState.lastTapNode===nodeId && now-_mapState.lastTap<500) {
        _mapState.lastTap=null; _mapState.firstNode=null; _mapState.selected=null; _mapState.linkMode=false;
        editNode(qi, nodeId); return;
      }
      _mapState.lastTap=now; _mapState.lastTapNode=nodeId;
      if(!_mapState.linkMode) {
        _mapState.firstNode = nodeId; _mapState.selected = nodeId; _mapState.linkMode = true;
        renderMap(qi); updateLinkPrompt(qi);
      } else {
        if(nodeId === _mapState.firstNode) {
          _mapState.firstNode=null; _mapState.selected=null; _mapState.linkMode=false;
          renderMap(qi); updateLinkPrompt(qi);
        } else {
          _mapState.selected = nodeId; renderMap(qi);
          askLinkLabel(qi, _mapState.firstNode, nodeId);
        }
      }
    }

    function addNodeDblClick(g, nodeId, qi) {
      g.addEventListener('dblclick', function(e) {
        e.preventDefault(); e.stopPropagation();
        _mapState.lastTap=null; _mapState.firstNode=null; _mapState.selected=null; _mapState.linkMode=false;
        editNode(qi, nodeId);
      });
    }

    function editNode(qi, nodeId) {

      var form=document.getElementById('link-form-'+qi); if(!form) return;
      form.style.display='block';
      var colorOpts=COLOR_NAMES.map(function(c,i){

      }).join('');
      var imgPreview = nd.image
        ? '<div style="margin-bottom:6px;"><img src="'+nd.image+'" style="max-width:100%;max-height:80px;border-radius:4px;border:1px solid var(--border);display:block;"></div>'
        : '';
      form.innerHTML='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;">Modifica concetto</div>'

        +'<div style="display:flex;gap:6px;margin-bottom:6px;">'
        +'<input id="edit-nd-label" value="'+nd.label+'" style="flex:1;padding:8px 10px;font-size:13px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);-webkit-appearance:none;">'
        +'<select id="edit-nd-color" style="padding:8px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);">'+colorOpts+'</select>'
        +'</div>'
        // Sezione immagine
        +'<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;">Immagine (opzionale)</div>'
        +imgPreview
        +'<div style="display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;">'
        +'<button onclick="pickNodeImage('+qi+',\''+nodeId+'\')" style="flex:1;padding:7px 6px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);cursor:pointer;">📁 Scegli file</button>'
        +(nd.image?'<button onclick="removeNodeImage('+qi+',\''+nodeId+'\')" style="padding:7px 8px;font-size:11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);cursor:pointer;color:#A32D2D;">✕ Rimuovi</button>':'')
        +'</div>'

        +'<button onclick="cancelLink('+qi+')" style="flex:1;padding:8px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;">Annulla</button>'
        +'</div>';
      setTimeout(function(){ var inp=document.getElementById('edit-nd-label'); if(inp){inp.focus();inp.select();} },100);
    }

    function pickNodeImage(qi, nodeId) {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = function(e) {
        var file = e.target.files[0]; if(!file) return;
        // Controlla dimensione (max 2MB)
        if(file.size > 2*1024*1024) {
          alert('Immagine troppo grande (max 2MB). Usa un\'immagine più piccola.');
          return;
        }
        var reader = new FileReader();
        reader.onload = function(ev) {
          var map=S.maps[qi]; if(!map) return;
          var nd=map.nodes.find(function(n){return n.id===nodeId;}); if(!nd) return;
          nd.image = ev.target.result; // base64 data URL
          saveCurrentSession();
          renderMap(qi);
          editNode(qi, nodeId);
        };
        reader.readAsDataURL(file);
      };
      document.body.appendChild(input); input.click(); document.body.removeChild(input);
    }

    function searchNodeImage(qi, nodeId) {
      var map=S.maps[qi]; if(!map) return;
      var nd=map.nodes.find(function(n){return n.id===nodeId;}); if(!nd) return;
      var query=encodeURIComponent(nd.label||'immagine');
      window.open('https://www.google.com/search?tbm=isch&q='+query,'_blank');
    }

    function cameraNodeImage(qi, nodeId) {
      // Su mobile usa il file picker con capture=camera
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.setAttribute('capture', 'environment');
      input.onchange = function(e) {
        var file = e.target.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          var map=S.maps[qi]; if(!map) return;
          var nd=map.nodes.find(function(n){return n.id===nodeId;}); if(!nd) return;
          nd.image = ev.target.result;
          saveCurrentSession(); renderMap(qi); editNode(qi, nodeId);
        };
        reader.readAsDataURL(file);
      };
      document.body.appendChild(input); input.click(); document.body.removeChild(input);
    }

    function removeNodeImage(qi, nodeId) {
      var map=S.maps[qi]; if(!map) return;
      var nd=map.nodes.find(function(n){return n.id===nodeId;}); if(!nd) return;
      nd.image=null;
      saveCurrentSession(); renderMap(qi);
      editNode(qi, nodeId);
    }

    function openImagePopup(nodeId, qi) {
      var map=S.maps[qi]; if(!map) return;
      var nd=map.nodes.find(function(n){return n.id===nodeId;}); if(!nd||!nd.image) return;
      // Rimuovi popup esistente
      var old=document.getElementById('img-popup'); if(old) old.remove();
      // Crea popup
      var popup=document.createElement('div');
      popup.id='img-popup';
      popup.style.cssText='position:absolute;z-index:500;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.18);padding:10px;max-width:90%;width:320px;';
      // Posiziona vicino al centro della mappa
      var wrap=document.getElementById('map-wrap-'+qi);
      if(wrap) {
        var wr=wrap.getBoundingClientRect();
        popup.style.left='50%'; popup.style.top='50%';
        popup.style.transform='translate(-50%,-50%)';
        wrap.style.position='relative';
        wrap.appendChild(popup);
      } else {
        popup.style.position='fixed'; popup.style.left='50%'; popup.style.top='50%';
        popup.style.transform='translate(-50%,-50%)';
        document.body.appendChild(popup);

    function zoomMap(qi, factor) {
      var svg = document.getElementById('mapsvg-'+qi);
      if(!svg) return;
      var vb = svg.viewBox.baseVal;
      var cx = vb.x + vb.width/2, cy = vb.y + vb.height/2;
      if(factor > 0) {
        // Zoom in: riduci viewBox (vedi più piccolo = nodi più grandi)
        var newW = Math.max(200, vb.width/factor);
        var newH = Math.max(150, vb.height/factor);
        svg.setAttribute('viewBox', (cx-newW/2)+' '+(cy-newH/2)+' '+newW+' '+newH);
      } else {
        // Zoom out: aumenta viewBox
        var f = Math.abs(factor);
        var newW = Math.min(1200, vb.width*f);
        var newH = Math.min(1000, vb.height*f);
        svg.setAttribute('viewBox', (cx-newW/2)+' '+(cy-newH/2)+' '+newW+' '+newH);
      }
    }

    function resetZoom(qi) {

    function doAutoLayout(qi) {
      autoLayout(qi);
      var svg=document.getElementById('mapsvg-'+qi);
      var map=S.maps[qi];
      if(!svg||!map||!map.nodes.length) return;
      var pad=60;
      var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      map.nodes.forEach(function(nd){
        var words=(nd.label||'').split(' '),lines=[],cur='';
        words.forEach(function(w){var t=(cur?cur+' ':'')+w;if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;}});
        if(cur)lines.push(cur);if(!lines.length)lines=[''];
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        var w=Math.max(60,maxLen*7+20)/2, h=(lines.length*14+20)/2;
        minX=Math.min(minX,nd.x-w-pad); minY=Math.min(minY,nd.y-h-pad);
        maxX=Math.max(maxX,nd.x+w+pad); maxY=Math.max(maxY,nd.y+h+pad);
      });
      var vw=Math.max(500,maxX-minX), vh=Math.max(400,maxY-minY);
      svg.setAttribute('viewBox',minX+' '+minY+' '+vw+' '+vh);
      renderMap(qi);
      renderNodePills(qi);
      saveCurrentSession();
    }

    function findFreePosition(map, W, H) {
      // Primo nodo: centro in alto
      if(map.nodes.length === 0) return {x: Math.round(W/2), y: 60};
      // Prova una griglia di posizioni e scegli quella più lontana dagli altri nodi
      var best = {x: W/2, y: H/2}, bestDist = 0;
      var candidates = [];
      for(var gx=1; gx<=5; gx++) for(var gy=1; gy<=5; gy++) {
        candidates.push({x: Math.round(W*gx/6), y: Math.round(H*gy/6)});
      }
      candidates.forEach(function(c) {
        var minDist = Infinity;
        map.nodes.forEach(function(nd) {
          var d = Math.sqrt((c.x-nd.x)*(c.x-nd.x)+(c.y-nd.y)*(c.y-nd.y));
          if(d < minDist) minDist = d;
        });
        if(minDist > bestDist) { bestDist = minDist; best = c; }
      });
      return best;
    }

    function saveRecite() {
      var questions=getQuestions();
      S.answers['recite']=questions.map(function(q,qi){
        return 'D: '+q+'\nR: '+((S.reciteAnswers&&S.reciteAnswers[qi])||'(non risposto)');
      }).join('\n\n');
    }

    // Stato navigazione Ripetizione
    if(typeof S.reciteActive === 'undefined') S.reciteActive = null;

    function goReciteList() { S.reciteActive = null; render(); }
    function goReciteQuestion(qi) { S.reciteActive = qi; render(); }

    function renderReciteHTML() {
      var questions=getQuestions();
      if(!S.reciteAnswers) S.reciteAnswers={};
      if(questions.length===0) {
        return '<div class="phase-card"><div class="phase-eyebrow">Fase 5 di 6</div>'
          +'<div class="phase-name">R — Ripetizione</div>'
          +'<div class="phase-desc">Non hai ancora domande focali.</div>'
          +'<div class="btn-row"><button class="btn" onclick="goPhase(1)">← Vai a Domande</button>'
          +'<button class="btn primary" onclick="goPhase(5)">Avanti →</button></div></div>';
      }
      if(S.reciteActive !== null && S.reciteActive < questions.length) {
        return renderReciteScreen(S.reciteActive, questions);
      }
      return renderReciteList(questions);
    }

    function renderReciteList(questions) {
      var items = questions.map(function(q, qi) {
        var ans = S.reciteAnswers[qi]||'';
        var done = ans.trim().length > 5;
        var sc = done ? '#1D9E75' : '#B4B2A9';
        var st = done ? 'Risposta inserita' : 'Non ancora risposto';
        return '<div onclick="goReciteQuestion('+qi+')" style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;">'
          +'<div style="width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+(qi+1)+'</div>'
          +'<div style="flex:1;min-width:0;">'
          +'<div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;">'+q+'</div>'
          +'<div style="font-size:12px;color:'+sc+';font-weight:500;">● '+st+'</div>'
          +'</div>'
          +'<div style="font-size:22px;color:var(--text3);">›</div>'
          +'</div>';
      }).join('');
      return '<div class="phase-card" style="margin-bottom:14px;">'
        +'<div class="phase-eyebrow">Fase 5 di 6</div>'
        +'<div class="phase-name">R — Ripetizione</div>'
        +'<div class="phase-desc">Seleziona una domanda e rispondi senza guardare gli appunti. Poi verifica con la mappa.</div>'
        +'</div>'
        +'<div style="margin-bottom:14px;">'+items+'</div>'
        +'<div class="btn-row" style="margin-bottom:16px;">'
        +'<button class="btn" onclick="goPhase(3)">← Indietro</button>'
        +'<button class="btn primary" onclick="goPhase(5)">Avanti →</button>'
        +'</div>';
    }

    function renderReciteScreen(qi, questions) {
      var q = questions[qi];
      var val = S.reciteAnswers[qi]||'';
      var map = S.maps[qi], hasMap = map && map.nodes.length > 0;
      var prev = qi > 0 ? '<button class="btn" onclick="goReciteQuestion('+(qi-1)+')">← Domanda '+(qi)+'</button>' : '<button class="btn" onclick="goReciteList()">← Lista</button>';
      var next = qi < questions.length-1
        ? '<button class="btn primary" onclick="goReciteQuestion('+(qi+1)+')">Domanda '+(qi+2)+' →</button>'
        : '<button class="btn primary" onclick="goReciteList()">Fine ✓</button>';

      var mapSection = hasMap
        ? '<button id="recite-map-btn-'+qi+'" onclick="toggleMap('+qi+')" style="width:100%;margin-top:10px;padding:10px;font-size:13px;font-weight:500;border:1px dashed var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);cursor:pointer;text-align:center;">Mostra mappa ▾</button>'
          +'<div id="recite-map-'+qi+'" style="display:none;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);overflow:auto;-webkit-overflow-scrolling:touch;">'
          +'<svg id="recite-mapsvg-'+qi+'" style="min-width:500px;width:100%;height:calc(100vh - 380px);min-height:320px;display:block;touch-action:none;"></svg>'
          +'</div>'

      return '<div class="phase-card" style="margin-bottom:12px;">'
        +'<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;">'
        +'<button onclick="goReciteList()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--blue);padding:0;line-height:1;flex-shrink:0;">‹</button>'
        +'<div style="flex:1;"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;">Domanda '+(qi+1)+' di '+questions.length+'</div>'
        +'<div style="font-size:14px;font-weight:700;color:var(--blue);line-height:1.4;margin-top:3px;background:var(--blue-light);padding:8px 10px;border-radius:var(--radius-sm);">'+q+'</div></div>'
        +'</div></div>'
        +'<div class="phase-card" style="margin-bottom:12px;">'
        +'<div class="section-label">La tua risposta</div>'
        +'<div style="display:flex;gap:6px;align-items:flex-start;">'
        +'<textarea id="ta-rec-'+qi+'" spellcheck="true" style="min-height:120px;flex:1;" placeholder="Rispondi con parole tue, senza guardare gli appunti..." oninput="if(!S.reciteAnswers)S.reciteAnswers={};S.reciteAnswers['+qi+']=this.value;saveRecite();">'+val+'</textarea>'

        +mathBtn('ta-rec-'+qi)
        +'</div></div>'
        +mapSection
        +'</div>'
        +'<div class="btn-row" style="margin-bottom:16px;">'+prev+next+'</div>';
    }

    function buildQReciteCompare() {
      var questions=getQuestions();
      if(questions.length===0) return '';
      return '<div style="margin-top:16px;">'
        +'<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Confronto domande / risposte Recite</div>'
        +questions.map(function(q,qi){
          var ans=(S.reciteAnswers&&S.reciteAnswers[qi])||'';
          var empty=!ans.trim(), hasQ=ans.includes('?');
          var status=empty?'non risposto':hasQ?'da ripassare (?)':'risposto';
          var sc=empty?'#D85A30':hasQ?'#BA7517':'#1D9E75';
          return '<div style="margin-bottom:10px;border-left:3px solid '+sc+';padding-left:10px;">'
            +'<div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:3px;">'+q+'</div>'
            +'<div style="font-size:11px;font-weight:600;color:'+sc+';margin-bottom:3px;">● '+status+'</div>'
            +(!empty?'<div style="font-size:12px;color:var(--text2);line-height:1.5;">'+ans.replace(/\n/g,'<br>')+'</div>':'')
            +'</div>';
        }).join('')+'</div>';
    }

        +'<div style="margin-top:16px;">'

    function renderExportHTML() {
      var score=computeScore(), sc=scoreColor(score);
      var questions=getQuestions();
      var totalSec=(S.sessionTimer||0)+(S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0);
      var dur=totalSec>0?formatDuration(totalSec):'—';

      // Stats
      var phasesOk=0;
      ['preview','question','read','recite','review'].forEach(function(id){ if((S.answers[id]||'').trim().length>10) phasesOk++; });
      var mapsOk=questions.filter(function(_,qi){ var m=S.maps[qi]; return m&&m.nodes.length>=2&&m.links.length>=1; }).length;
      var reciteOk=questions.filter(function(_,qi){ return S.reciteAnswers&&S.reciteAnswers[qi]&&S.reciteAnswers[qi].trim().length>5; }).length;

      var statsHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">'

      return '<div class="phase-card">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'
        +'<button onclick="goPhase(PHASES.length-1)" style="background:var(--blue-light);border:none;border-radius:var(--radius-sm);font-size:20px;font-weight:700;cursor:pointer;color:var(--blue);padding:6px 12px;line-height:1;flex-shrink:0;">\u2190</button>'
        +'<div><div class="phase-eyebrow">Esportazione</div>'
        +'<div class="phase-name" style="margin-bottom:0;">Salva sessione</div></div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'

    function svgForMap(qi) {
      var map=S.maps[qi]; if(!map||map.nodes.length===0) return null;
      var ns='http://www.w3.org/2000/svg';
      // Nodi e link originali (nessuna scala artificiale)
      var scaledNodes = map.nodes.slice();
      var scaledLinks = map.links.slice();

      // Font e dimensioni fisse a 12pt
      var FONT = 12, LINE_H = 16, NODE_PAD = 10;

      // Calcola bounding box reale
      var pad=40;
      var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      scaledNodes.forEach(function(nd){
        var words=(nd.label||'').split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur); if(lines.length===0) lines=[''];
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        var w=Math.max(60,maxLen*7+NODE_PAD*2);
        var h=lines.length*LINE_H+NODE_PAD*2;
        if(nd.image) h=Math.max(h,60);
        minX=Math.min(minX,nd.x-w/2-pad);
        minY=Math.min(minY,nd.y-h/2-pad);
        maxX=Math.max(maxX,nd.x+w/2+pad);
        maxY=Math.max(maxY,nd.y+h/2+pad);
      });
      var vw=Math.max(300,maxX-minX);
      var vh=Math.max(200,maxY-minY);

      var svg=document.createElementNS(ns,'svg');
      svg.setAttribute('viewBox',minX+' '+minY+' '+vw+' '+vh);
      svg.setAttribute('xmlns',ns);
      // NON impostare width/height assoluti — il CSS dell'img controlla la dimensione
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');

      var defs=document.createElementNS(ns,'defs');
      var mk=document.createElementNS(ns,'marker');
      mk.setAttribute('id','arr'); mk.setAttribute('markerWidth','10');
      mk.setAttribute('markerHeight','10'); mk.setAttribute('refX','9');
      mk.setAttribute('refY','4'); mk.setAttribute('orient','auto');
      var mp=document.createElementNS(ns,'path');
      mp.setAttribute('d','M0,0 L0,8 L10,4 z'); mp.setAttribute('fill','#B4B2A9');
      mk.appendChild(mp); defs.appendChild(mk);
      var mkS=document.createElementNS(ns,'marker');
      mkS.setAttribute('id','arr-start'); mkS.setAttribute('markerWidth','10');
      mkS.setAttribute('markerHeight','10'); mkS.setAttribute('refX','1');
      mkS.setAttribute('refY','4'); mkS.setAttribute('orient','auto');
      var mpS=document.createElementNS(ns,'path');
      mpS.setAttribute('d','M10,0 L10,8 L0,4 z'); mpS.setAttribute('fill','#B4B2A9');
      mkS.appendChild(mpS); defs.appendChild(mkS);
      svg.appendChild(defs);

      // Sfondo bianco
      var bg=document.createElementNS(ns,'rect');
      bg.setAttribute('x',minX);bg.setAttribute('y',minY);
      bg.setAttribute('width',vw);bg.setAttribute('height',vh);
      bg.setAttribute('fill','#F8F7F2');
      svg.appendChild(bg);

      // Funzione helper locale che usa i nodi scalati
      function edgePt(fromNd, toNd, nd, isTarget) {
        var words=(nd.label||'').split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur); if(lines.length===0) lines=[''];
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        var nw=Math.max(60,maxLen*7+20)/2;
        var nh=(lines.length*16+20)/2;
          var dx=toNd.x-fromNd.x, dy=toNd.y-fromNd.y;
        if(dx===0&&dy===0) return {x:nd.x,y:nd.y};
        var ox=isTarget?toNd.x:fromNd.x, oy=isTarget?toNd.y:fromNd.y;
        var rx=isTarget?-dx:dx, ry=isTarget?-dy:dy;
        var ts=[];
        if(rx!==0){ ts.push((nd.x-nw-ox)/rx); ts.push((nd.x+nw-ox)/rx); }
        if(ry!==0){ ts.push((nd.y-nh-oy)/ry); ts.push((nd.y+nh-oy)/ry); }
        ts=ts.filter(function(t){return t>0;}).sort(function(a,b){return a-b;});
        if(ts.length===0) return {x:nd.x,y:nd.y};
        var t=ts[0];
        return {x:Math.max(nd.x-nw,Math.min(nd.x+nw,ox+rx*t)),
                y:Math.max(nd.y-nh,Math.min(nd.y+nh,oy+ry*t))};
      }

      var fromCount2={};
      scaledLinks.forEach(function(lk){ fromCount2[lk.from]=(fromCount2[lk.from]||0)+1; });
      var fromIndex2={};

      scaledLinks.forEach(function(lk){
        var fn=scaledNodes.find(function(n){return n.id===lk.from;}),
            tn=scaledNodes.find(function(n){return n.id===lk.to;});
        if(!fn||!tn) return;
        var dx=tn.x-fn.x, dy=tn.y-fn.y, dist=Math.sqrt(dx*dx+dy*dy)||1;
        var p1=edgePt(fn,tn,fn,false), p2=edgePt(fn,tn,tn,true);
        var x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y;
        fromIndex2[lk.from]=(fromIndex2[lk.from]||0);
        var idx2=fromIndex2[lk.from]; fromIndex2[lk.from]++;
        var total2=fromCount2[lk.from]||1;
        var offset2=total2>1?(idx2-(total2-1)/2)*36:0;
        var nx2=-dy/dist, ny2=dx/dist;
        var cmx=(x1+x2)/2+nx2*offset2, cmy=(y1+y2)/2+ny2*offset2;
        var lx=(x1+x2)/2*0.3+cmx*0.7, ly=(y1+y2)/2*0.3+cmy*0.7;
        var path=document.createElementNS(ns,'path');
        path.setAttribute('d','M'+x1+','+y1+' Q'+cmx+','+cmy+' '+x2+','+y2);
        path.setAttribute('stroke','#B4B2A9');path.setAttribute('stroke-width','2');
        path.setAttribute('fill','none');path.setAttribute('marker-end','url(#arr)');
        if(lk.bidir) path.setAttribute('marker-start','url(#arr-start)');
        svg.appendChild(path);
        if(lk.label){
          var lw=Math.min(lk.label.length*7+16,160);
          var bgr=document.createElementNS(ns,'rect');
          bgr.setAttribute('x',lx-lw/2);bgr.setAttribute('y',ly-11);
          bgr.setAttribute('width',lw);bgr.setAttribute('height',20);
          bgr.setAttribute('rx','5');bgr.setAttribute('fill','#EFEDE6');
          svg.appendChild(bgr);
          var lt=document.createElementNS(ns,'text');
          lt.setAttribute('x',lx);lt.setAttribute('y',ly+5);
          lt.setAttribute('text-anchor','middle');lt.setAttribute('font-size','12');
          lt.setAttribute('font-style','italic');lt.setAttribute('fill','#5F5E5A');
          lt.textContent=lk.label.length>22?lk.label.slice(0,21)+'…':lk.label;
          svg.appendChild(lt);
        }
      });

      scaledNodes.forEach(function(nd){
        var label=nd.label||'', c=COLORS[nd.color||0];
        var words=label.split(' '), lines=[], cur='';
        words.forEach(function(w){ var t=(cur?cur+' ':'')+w; if(t.length>18&&cur){lines.push(cur);cur=w;}else{cur=t;} });
        if(cur) lines.push(cur); if(lines.length===0) lines=[''];
        var maxLen=lines.reduce(function(m,l){return Math.max(m,l.length);},0);
        var lineH=16, nodePad=10;
        var w=Math.max(60,maxLen*7+nodePad*2);
        var h=lines.length*lineH+nodePad*2;
        // Nodo — solo testo, nessuna immagine dentro
        var rect=document.createElementNS(ns,'rect');
        rect.setAttribute('x',nd.x-w/2);rect.setAttribute('y',nd.y-h/2);
        rect.setAttribute('width',w);rect.setAttribute('height',h);
        rect.setAttribute('rx','9');rect.setAttribute('fill',c+'22');
        rect.setAttribute('stroke',c);rect.setAttribute('stroke-width','2.5');
        svg.appendChild(rect);
        // Testo centrato
        var txt=document.createElementNS(ns,'text');
        txt.setAttribute('x',nd.x);
        txt.setAttribute('y', nd.y-(lines.length-1)*lineH/2+4);
        txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','12');
        txt.setAttribute('fill',c);txt.setAttribute('font-weight','700');
        if(lines.length===1){
          txt.textContent=lines[0];
        } else {
          lines.forEach(function(line,li){
            var ts=document.createElementNS(ns,'tspan');
            ts.setAttribute('x',nd.x); ts.setAttribute('dy',li===0?'0':'16');
            ts.textContent=line; txt.appendChild(ts);
          });
        }
        svg.appendChild(txt);
        // Icona immagine sotto il nodo (come in CmapTools)
        if(nd.image) {
          var iconBg=document.createElementNS(ns,'rect');
          iconBg.setAttribute('x',nd.x-12); iconBg.setAttribute('y',nd.y+h/2+2);
          iconBg.setAttribute('width',24); iconBg.setAttribute('height',14);
          iconBg.setAttribute('rx','3'); iconBg.setAttribute('fill',c+'33');
          iconBg.setAttribute('stroke',c); iconBg.setAttribute('stroke-width','1');
          svg.appendChild(iconBg);
          var iconTxt=document.createElementNS(ns,'text');
          iconTxt.setAttribute('x',nd.x); iconTxt.setAttribute('y',nd.y+h/2+13);
          iconTxt.setAttribute('text-anchor','middle'); iconTxt.setAttribute('font-size','9');
          iconTxt.setAttribute('fill',c);
          iconTxt.textContent='\uD83D\uDDBC';
          svg.appendChild(iconTxt);
        }
      });
      return btoa(unescape(encodeURIComponent(new XMLSerializer().serializeToString(svg))));
    }

        lines.push('');
      }
      if(S.reciteAnswers && Object.keys(S.reciteAnswers).length>0) {
        lines.push('*Risposte Ripetizione:*');
        q.forEach(function(dq,i){
          var ans = S.reciteAnswers[i]||'';
          if(ans.trim()) lines.push('D: '+dq+'\nR: '+ans.slice(0,200));
        });
        lines.push('');
      }
      if(S.reviewParts) {
        if((S.reviewParts.fondamentali||'').trim()) {
          lines.push('*Concetti fondamentali:*');
          lines.push(S.reviewParts.fondamentali.slice(0,300));
          lines.push('');
        }
        if((S.reviewParts.lacune||'').trim()) {
          lines.push('*Da ripassare:*');
          lines.push(S.reviewParts.lacune.slice(0,200));
        }
      }
      lines.push('');
      lines.push('_Inviato da PQ4R Studio_');
      return lines.join('\n');
    }

    // ---- POMODORO ----
    var _pomodoro = { interval: null, seconds: 0, running: false, mode: 'work' };
    var POMODORO_WORK = 25*60, POMODORO_BREAK = 5*60;

    function togglePomodoro() {
      if(_pomodoro.running) {
        clearInterval(_pomodoro.interval); _pomodoro.running=false;
        updatePomodoroBtn();
      } else {
        if(_pomodoro.seconds===0) _pomodoro.seconds=POMODORO_WORK;
        _pomodoro.running=true;
        _pomodoro.interval=setInterval(function(){
          _pomodoro.seconds--;
          updatePomodoroBtn();
          if(_pomodoro.seconds<=0) {
            clearInterval(_pomodoro.interval); _pomodoro.running=false;
            if(_pomodoro.mode==='work') {
              _pomodoro.mode='break'; _pomodoro.seconds=POMODORO_BREAK;
              alert('Tempo scaduto! Prenditi una pausa di 5 minuti.');
            } else {
              _pomodoro.mode='work'; _pomodoro.seconds=POMODORO_WORK;
              alert('Pausa finita! Riprendi lo studio.');
            }
            updatePomodoroBtn();
          }
        },1000);
        updatePomodoroBtn();
      }
    }

    function resetPomodoro() {
      clearInterval(_pomodoro.interval); _pomodoro.running=false;
      _pomodoro.seconds=0; _pomodoro.mode='work';
      updatePomodoroBtn();
    }

    function updatePomodoroBtn() {
      var btn=document.getElementById('pomodoro-btn'); if(!btn) return;
      var s=_pomodoro.seconds>0?_pomodoro.seconds:POMODORO_WORK;
      var m=Math.floor(s/60), ss=s%60;
      var label=(m>0?m+'m ':'')+String(ss).padStart(2,'0')+'s';
      var isBreak=_pomodoro.mode==='break';
      btn.textContent=(_pomodoro.running?(isBreak?'☕ ':'🍅 '):'🍅 ')+label;
      btn.style.background=_pomodoro.running?(isBreak?'#E1F5EE':'#FCEBEB'):'';
      btn.style.color=_pomodoro.running?(isBreak?'#085041':'#A32D2D'):'';
    }
